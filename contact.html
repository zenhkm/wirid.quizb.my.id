<!doctype html>
<html lang="id" dir="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Mafatihul Akhyar</title>
  <meta name="theme-color" content="#050a18" />
  <link rel="icon" href="logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050a18;--panel:#0a1128;--card:rgba(15,23,50,.65);--text:#e8edf5;--muted:#8b9dc3;--accent:#10b981;--border:rgba(255,255,255,.08);--surface:rgba(255,255,255,.04);--glow:#10b98120;--transition:all .25s cubic-bezier(.4,0,.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--bg);color:var(--text);font:16px/1.75 'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(16,185,129,.12),transparent 60%),radial-gradient(ellipse 60% 40% at 80% 10%,rgba(59,130,246,.06),transparent 50%)}
    a{color:#6ee7b7;text-decoration:none;transition:var(--transition)}
    a:hover{color:#a7f3d0}
    .wrap{max-width:720px;margin:auto;padding:20px 16px 32px;position:relative;z-index:1}
    .hero{padding:24px;border:1px solid var(--border);border-radius:20px;background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);margin-bottom:16px;animation:fadeUp .5s both}
    .brand{display:flex;align-items:center;gap:14px}
    .brand img{width:50px;height:50px;border-radius:14px;object-fit:contain;box-shadow:0 4px 20px rgba(16,185,129,.15)}
    .eyebrow{color:var(--accent);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
    h1{margin:4px 0 0;font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:-.02em;line-height:1.2}
    .lead{color:var(--muted);margin-top:10px;font-size:15px}
    .nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
    .nav a,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:9px 16px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:600;font-size:14px;transition:var(--transition)}
    .nav a:hover,.btn:hover{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--text)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);animation:fadeUp .5s .1s both}
    .contact-item{margin:8px 0;padding:16px;border:1px solid var(--border);border-radius:14px;background:var(--surface);display:flex;align-items:center;gap:14px;transition:var(--transition)}
    .contact-item:hover{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06)}
    .contact-icon{font-size:24px;flex-shrink:0;width:44px;height:44px;display:grid;place-items:center;background:rgba(16,185,129,.1);border-radius:12px}
    .contact-info{min-width:0}
    .contact-info strong{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-bottom:2px}
    .contact-info a{font-size:15px;word-break:break-all}
    .cta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
    footer{text-align:center;color:var(--muted);padding:16px 12px 24px;font-size:13px;opacity:.6}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
    @media(max-width:560px){.wrap{padding:14px 12px 24px}.nav a,.btn{flex:1 1 calc(50% - 4px)}.card{padding:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">
        <img src="logo.png" alt="Logo Mafatihul Akhyar">
        <div>
          <div class="eyebrow">Mafatihul Akhyar</div>
          <h1>Contact</h1>
        </div>
      </div>
      <p class="lead">Silakan hubungi kami melalui kontak berikut.</p>
      <nav class="nav">
        <a href="index.html">🏠 Beranda</a>
        <a href="download.html">📲 Download</a>
        <a href="privasi.html">📜 Privasi</a>
        <a href="tentang.html">ℹ️ Tentang</a>
        <a href="saran.html">💡 Saran</a>
      </nav>
    </section>

    <div class="card">
      <div class="contact-item">
        <div class="contact-icon">📧</div>
        <div class="contact-info">
          <strong>Email</strong>
          <a href="mailto:zenhkm@gmail.com">zenhkm@gmail.com</a>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon">📞</div>
        <div class="contact-info">
          <strong>Telepon</strong>
          <a href="tel:085743399595">085743399595</a>
        </div>
      </div>
      <div class="contact-item">
        <div class="contact-icon">💬</div>
        <div class="contact-info">
          <strong>WhatsApp</strong>
          <a href="https://wa.me/6285743399595" target="_blank" rel="noopener">Chat via WhatsApp</a>
        </div>
      </div>
      <div class="cta-row">
        <a class="btn" href="saran.html">💡 Buka Halaman Saran</a>
        <a class="btn" href="download.html">📲 Download Aplikasi</a>
      </div>
    </div>
  </div>
  <footer>© Mafatihul Akhyar</footer>
</body>
</html>
