<!doctype html>
<html lang="id" dir="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact - Mafatihul Akhyar</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="logo.png" type="image/png" />
  <style>
    :root{--bg:#0b1020;--panel:#0f172a;--card:#111827;--text:#e2e8f0;--muted:#94a3b8;--accent:#22c55e;--line:#ffffff1a}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#17315c 0%,transparent 25%),var(--bg);color:var(--text);font:16px/1.7 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    a{color:#bbf7d0}
    .wrap{max-width:920px;margin:auto;padding:14px 12px 24px}
    .hero{padding:16px;border:1px solid var(--line);border-radius:20px;background:linear-gradient(135deg,rgba(34,197,94,.16),rgba(15,23,42,.96));box-shadow:0 12px 34px #00000030;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:12px}.brand img{width:52px;height:52px;border-radius:14px;object-fit:contain;background:#ffffff12}
    .eyebrow{color:#86efac;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    h1{margin:4px 0 0;font-size:clamp(24px,5vw,34px);line-height:1.15}
    .lead,.muted{color:var(--muted)}
    .nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .nav a,.btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 12px;border-radius:12px;border:1px solid #22c55e44;background:#ffffff0c;color:var(--text);text-decoration:none;font-weight:700}
    .card{background:rgba(17,24,39,.95);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px #00000025}
    .line{margin:10px 0;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:#ffffff08;display:grid;gap:4px}
    .line strong{font-size:14px}.line a{word-break:break-all}
    footer{text-align:center;color:var(--muted);padding:10px 12px 18px;font-size:13px}
    @media (max-width:560px){.wrap{padding:12px 10px 20px}.brand{align-items:flex-start}.nav a,.btn{flex:1 1 calc(50% - 8px)}.card{padding:14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">
        <img src="logo.png" alt="Logo Mafatihul Akhyar">
        <div>
          <div class="eyebrow">Mafatihul Akhyar</div>
          <h1>Contact</h1>
        </div>
      </div>
      <p class="lead">Silakan hubungi kami melalui kontak berikut. Semua link sudah dibuat lebih nyaman untuk diklik dari HP.</p>
      <nav class="nav">
        <a href="index.html">🏠 Beranda</a>
        <a href="privasi.html">📜 Privasi</a>
        <a href="tentang.html">ℹ️ Tentang</a>
        <a href="saran.html">💡 Saran</a>
      </nav>
    </section>

    <div class="card">
      <div class="line">
        <strong>📧 Email</strong>
        <a href="mailto:zenhkm@gmail.com">zenhkm@gmail.com</a>
      </div>
      <div class="line">
        <strong>📞 Telepon</strong>
        <a href="tel:085743399595">085743399595</a>
      </div>
      <div class="line">
        <strong>💬 WhatsApp</strong>
        <a href="https://wa.me/6285743399595" target="_blank" rel="noopener">Chat via WhatsApp</a>
      </div>

      <p>
        <a class="btn" href="saran.html">Buka Halaman Saran</a>
      </p>
    </div>
  </div>
  <footer>© Mafatihul Akhyar</footer>
</body>
</html>
