<!doctype html>
<html lang="id" dir="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mafatihul Akhyar</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="icon" href="logo.png" type="image/png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root{
      --bg:#050a18; --panel:#0a1128; --muted:#8b9dc3; --text:#e8edf5; --brand:#10b981;
      --card:rgba(15,23,50,.65); --ring:#10b98144; --fs:1; --fsModal:1.1; --line:#ffffff12; --accent:#10b981;
      --glow:#10b98120; --surface:rgba(255,255,255,.04); --border:rgba(255,255,255,.08);
      --radius:16px; --transition:all .25s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="light"]{
      --bg:#f0f4f8; --panel:#ffffff; --muted:#5a6b82; --text:#0f172a; --brand:#059669;
      --card:rgba(255,255,255,.75); --ring:#10b98133; --line:#00000010; --accent:#059669;
      --glow:#05966920; --surface:rgba(0,0,0,.02); --border:rgba(0,0,0,.08);
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    html,body{height:100%;overflow-x:hidden;overscroll-behavior:none}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font:16px/1.7 'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(16,185,129,.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 10%, rgba(59,130,246,.06) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 10% 60%, rgba(139,92,246,.04) 0%, transparent 50%);
    }

    /* Header */
    header{
      position:sticky;top:0;z-index:60;
      background:rgba(10,17,40,.82);
      backdrop-filter:saturate(140%) blur(20px);-webkit-backdrop-filter:saturate(140%) blur(20px);
      border-bottom:1px solid var(--border);
      padding:10px 12px 12px;
      transition:background .3s;
    }
    [data-theme="light"] header{background:rgba(255,255,255,.85)}
    .header-inner{
      max-width:860px;margin:0 auto;display:flex;flex-direction:column;align-items:center;
      gap:10px;position:relative;
    }
    .right{position:absolute;top:4px;right:0;display:flex;gap:6px}
    .logo{width:52px;height:52px;flex-shrink:0}
    .logo img{width:100%;height:100%;object-fit:contain;border-radius:14px;box-shadow:0 4px 20px rgba(16,185,129,.15)}
    .title{font-weight:800;font-size:clamp(21px,4.5vw,26px);text-align:center;line-height:1.2;padding:0 88px;letter-spacing:-.02em}

    /* Pencarian */
    .search{
      position:absolute;left:0;top:4px;
      display:flex;align-items:center;gap:8px;
      background:var(--surface);border:1px solid var(--border);border-radius:12px;
      padding:7px 10px;min-width:0;max-width:180px;width:100%;
      transition:var(--transition);
    }
    .search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
    .search svg{width:14px;height:14px;flex:0 0 auto;opacity:.5}
    .search input{
      all:unset;color:var(--text);font-size:14px;line-height:1.2;
      flex:1;min-width:0;width:100%;font-family:inherit;
    }
    .search input::placeholder{color:var(--muted);opacity:.6}
    .btn{cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:7px 12px;border-radius:10px;font-size:14px;font-family:inherit;transition:var(--transition)}
    .btn:hover{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3)}
    .btn.small{min-width:28px;padding:0 6px;font-size:12px}
    .iconbtn{min-height:38px;display:grid;place-items:center;border-radius:12px;border:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 11px;cursor:pointer;transition:var(--transition)}
    .iconbtn:hover{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25)}
    .iconbtn:active{transform:scale(.95)}

    /* Kategori + Bookmark bar */
    .tabs,.bmbar{
      display:flex;flex-wrap:wrap;gap:6px;padding:8px 2px 4px;
      justify-content:center;align-items:center;overflow:visible;scrollbar-width:none;
      max-width:860px;margin:0 auto;
    }
    .tabs::-webkit-scrollbar,.bmbar::-webkit-scrollbar{display:none}
    .chip{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;flex:0 0 auto;transition:var(--transition);font-family:inherit}
    .chip:hover{color:var(--text);border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.06)}
    .chip.active{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35);color:var(--accent);font-weight:600;box-shadow:0 0 0 2px var(--glow)}
    .bmbar{margin:2px auto 6px}
    .bmbar .bm{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;flex:0 0 auto;transition:var(--transition);font-family:inherit;color:var(--text)}
    .bmbar .bm:hover{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.08)}
    .bmbar .empty{opacity:.6;font-size:12px;padding:4px 2px;text-align:center;width:100%}

    /* Layout utama */
    .wrap{max-width:860px;margin:auto;padding:14px 14px 24px;position:relative;z-index:1}
    .grid{display:grid;gap:10px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:var(--transition)}

    /* Item Doa (list) */
    details.doa{border:1px solid var(--border);border-radius:var(--radius);background:var(--card);overflow:hidden;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);transition:var(--transition)}
    details.doa:hover{border-color:rgba(16,185,129,.2);box-shadow:0 8px 32px rgba(16,185,129,.06)}
    [data-theme="light"] details.doa{background:var(--card)}

    /* Ringkas overlap */
    summary{list-style:none;padding:14px 16px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;transition:background .2s}
    summary:hover{background:rgba(16,185,129,.03)}
    summary::-webkit-details-marker{display:none}
    .ttl{font-weight:600;min-width:0;overflow-wrap:anywhere;word-break:break-word;font-size:15px;letter-spacing:-.01em}
    .resume-badge{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid var(--accent);color:var(--accent);background:rgba(16,185,129,.08);justify-self:end;font-weight:600}
    .actions{display:flex;gap:6px;flex-wrap:wrap;justify-self:end}
    .actions .icon{min-height:34px;display:grid;place-items:center;padding:0 10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:var(--transition)}
    .actions .icon:hover{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25)}
    .actions .icon:active{transform:scale(.92)}

    .arabic{font-family:"Noto Naskh Arabic","Amiri","Scheherazade New","Traditional Arabic","Tahoma",serif;font-size:calc(clamp(23px,5.9vw,32px)*var(--fs));line-height:2.05;direction:rtl;text-align:right;word-break:break-word;overflow-wrap:anywhere}
    .arabic .seg + .seg{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}

    footer{opacity:.6;text-align:center;padding:16px 8px 20px;font-size:13px}

    /* Drawer */
    .shade{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.3s;z-index:70}
    .shade.show{opacity:1;pointer-events:auto}
    .drawer{
      position:fixed;right:0;top:0;height:100%;width:340px;max-width:90vw;background:var(--panel);
      border-left:1px solid var(--border);transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:80;
      display:flex;flex-direction:column;overflow:hidden
    }
    .drawer.open{transform:translateX(0)}
    .drawer header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
    .drawer-scroll{flex:1;overflow:auto}
    .menu-list{display:grid;gap:8px;padding:14px}
    .menu-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;font-weight:500;text-decoration:none;color:var(--text);transition:var(--transition)}
    .menu-item:hover{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2)}
    .menu-item.highlight{background:linear-gradient(135deg,rgba(16,185,129,.12),rgba(59,130,246,.08));border-color:rgba(16,185,129,.3)}
    .drawer section{padding:0 14px 16px}
    .drawer h3{margin:6px 0 4px;font-size:14px;font-weight:600}
    .small{font-size:13px;line-height:1.55}

    /* MODAL */
    .modalShade{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.25s;z-index:100}
    .modalShade.show{opacity:1;pointer-events:auto}
    .modal{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--panel);transform:translateY(8px);opacity:0;transition:.25s cubic-bezier(.4,0,.2,1);z-index:110;pointer-events:none}
    .modal.show{opacity:1;transform:none;pointer-events:auto}
    .modal header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--panel)}
    .modal .titleWrap{display:flex;align-items:center;justify-content:center}
    .modal .ttl{font-weight:800;font-size:18px;text-align:center;max-width:90vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.02em}
    .modal .toolsRow{display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--panel)}
    .modal .toolsRow .iconbtn{min-height:38px;padding:0 12px}
    .resumeBar{display:none;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border-bottom:1px dashed var(--line);font-size:14px;color:var(--muted);flex-wrap:wrap}
    .resumeBar.show{display:flex}
    .resumeBar .btn{padding:6px 12px}
    .modal .body{flex:1;overflow:auto;padding:16px 14px 24px}
    .arabic-modal{font-family:"Noto Naskh Arabic","Amiri","Scheherazade New","Traditional Arabic","Tahoma",serif;font-size:calc(clamp(26px,6.2vw,38px)*var(--fsModal));line-height:2.08;direction:rtl;text-align:right;word-break:break-word;overflow-wrap:anywhere}
    .arabic-modal .seg + .seg{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}

    /* TOAST */
    .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(20px);background:rgba(10,17,40,.95);color:#e8edf5;border:1px solid var(--border);padding:10px 18px;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.3);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);opacity:0;z-index:200;transition:opacity .25s,transform .25s;max-width:90vw;text-align:center;font-size:14px;font-weight:500}
    [data-theme="light"] .toast{background:rgba(255,255,255,.95);color:#0f172a;box-shadow:0 12px 40px rgba(0,0,0,.12)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Loader */
    .loader{display:flex;justify-content:center;padding:6px 0}
    .loader[hidden]{display:none!important}
    .loader .spinner{width:22px;height:22px;border:2.5px solid var(--border);border-left-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Download banner floating */
    .dl-float{
      position:fixed;bottom:20px;right:20px;z-index:50;
      display:flex;align-items:center;gap:8px;
      padding:10px 18px;border-radius:999px;
      background:linear-gradient(135deg,#10b981,#059669);
      color:#fff;font-weight:700;font-size:14px;
      box-shadow:0 8px 30px rgba(16,185,129,.35);
      text-decoration:none;cursor:pointer;
      transition:var(--transition);
      animation:floatIn .5s .8s both;
    }
    .dl-float:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(16,185,129,.45)}
    .dl-float svg{width:20px;height:20px}
    @keyframes floatIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

    @media (max-width:720px){
      .title{padding:0 74px;font-size:20px}
      .search{position:relative;left:auto;top:auto;order:3;width:100%;max-width:none}
      .right{top:0;right:0}
      .tabs,.bmbar{
        flex-wrap:nowrap;
        justify-content:flex-start;
        overflow:auto;
        margin:0;max-width:none;
      }
    }

    @media (max-width:520px){
      header{padding-top:calc(10px + env(safe-area-inset-top))}
      .wrap{padding:10px 10px 20px}
      summary{grid-template-columns:1fr}
      .resume-badge{justify-self:start}
      .actions{grid-column:1/-1;justify-content:space-between}
      .actions .icon{flex:1 1 calc(33.33% - 6px)}
      .modal .toolsRow .iconbtn{flex:1 1 calc(33.33% - 6px);min-width:72px}
      .resumeBar{padding:10px 12px;text-align:center}
      .dl-float{bottom:14px;right:14px;padding:8px 14px;font-size:13px}
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <!-- Pencarian kecil kiri atas -->
        <label class="search" title="Cari judul atau isi doa">
          <svg viewBox="0 0 24 24" fill="none"><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/></svg>
          <input id="q" placeholder="cari..." />
          <button class="btn small" id="clearBtn" hidden>✕</button>
        </label>

        <!-- Logo & judul tetap di tengah -->
        <div class="logo"><img src="logo.png" alt="Logo Mafatihul Akhyar"></div>
        <div class="title">Mafatihul Akhyar</div>

        <!-- Loader -->
        <div id="loader" class="loader" hidden><div class="spinner" aria-label="Memuat…"></div></div>

        <!-- KANAN: tema & menu -->
        <div class="right">
          <button class="iconbtn" id="toggleThemeTop" title="Mode gelap/terang">🌓</button>
          <button class="iconbtn" id="hamburger" aria-label="Menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <!-- Kategori + Bookmark bar -->
      <div class="tabs" id="tabs"></div>
      <div class="bmbar" id="bmList"></div>
    </header>

    <main class="wrap">
      <section id="list" class="grid" style="grid-template-columns:1fr;"></section>
    </main>

    <footer class="wrap">© <span id="year"></span> Mafatihul Akhyar</footer>
  </div>

  <!-- Drawer -->
  <div class="shade" id="shade"></div>
  <nav class="drawer" id="drawer">
    <header>
      <div style="font-weight:700">Menu</div>
      <button class="iconbtn" id="closeDrawer" aria-label="Tutup">✕</button>
    </header>

    <div class="drawer-scroll">
      <div class="menu-list">
        <a class="menu-item highlight" href="download.html">📲 Download Aplikasi</a>
        <a class="menu-item" href="privasi.html">📜 Kebijakan Privasi</a>
        <a class="menu-item" href="tentang.html">ℹ️ Tentang Aplikasi</a>
        <div class="menu-item" id="clearAllPos">🧽 Bersihkan semua posisi</div>
        <a class="menu-item" href="contact.html">✉️ Contact</a>
        <a class="menu-item" href="saran.html">💡 Saran & Usulan</a>
      </div>
    </div>
  </nav>

  <!-- Template item doa -->
  <template id="tpl-doa">
    <details class="doa">
      <summary>
        <div class="ttl"></div>
        <span class="resume-badge" hidden>Lanjutkan</span>
        <div class="actions">
          <button class="icon bookmark" title="Simpan penanda">🔖</button>
          <button class="icon share" title="Bagikan">📤</button>
          <button class="icon copy" title="Salin teks">📋</button>
        </div>
      </summary>
      <div class="body" style="padding:10px 12px 14px">
        <div class="arabic txt-ar"></div>
      </div>
    </details>
  </template>

  <!-- MODAL -->
  <div class="modalShade" id="modalShade" aria-hidden="true"></div>
  <div class="modal" id="modal" aria-hidden="true">
    <header><div class="titleWrap"><div class="ttl" id="modalTitle">Judul Doa</div></div></header>
    <div class="toolsRow">
      <button class="iconbtn" id="markPos" title="Simpan posisi terakhir (baris terakhir dibaca)">📌</button>
      <button class="iconbtn" id="clearPos" title="Hapus posisi terakhir (penanda Lanjutkan)">🧹</button>
      <button class="iconbtn" id="fontMinus" title="Perkecil">A−</button>
      <button class="iconbtn" id="fontPlus" title="Perbesar">A+</button>
      <button class="iconbtn" id="toggleThemeModal" title="Mode gelap/terang">🌓</button>
      <button class="iconbtn" id="closeModal" title="Tutup">✕</button>
    </div>
    <div class="resumeBar" id="resumeBar">
      Ada posisi terakhir tersimpan. <button class="btn" id="resumeBtn">Lanjutkan</button>
    </div>
    <div class="body" id="modalBody"><div class="arabic-modal" id="modalArabic"></div></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const APP_TITLE = "Mafatihul Akhyar";
    const DATA_URL = "./data.json";

    let DOA = [];
    let KAT = ["Semua"];
    const state = { q:"", kat:"Semua", bookmarks:new Set(JSON.parse(localStorage.getItem('bm')||'[]')) };
    let currentDoa = null;

    const list = document.getElementById('list');
    const tpl = document.getElementById('tpl-doa');
    const tabs = document.getElementById('tabs');
    const bmList = document.getElementById('bmList');
    const toastEl = document.getElementById('toast');
    const loader = document.getElementById('loader');

    const modalShade = document.getElementById('modalShade');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalArabic = document.getElementById('modalArabic');
    const modalBody = document.getElementById('modalBody');
    const closeModalBtn = document.getElementById('closeModal');
    const toggleThemeModal = document.getElementById('toggleThemeModal');
    const fontPlus = document.getElementById('fontPlus');
    const fontMinus = document.getElementById('fontMinus');
    const markPosBtn = document.getElementById('markPos');
    const clearPosBtn = document.getElementById('clearPos');
    const resumeBar = document.getElementById('resumeBar');
    const resumeBtn = document.getElementById('resumeBtn');

    let toastTimer;
    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2000);
    }

    function setTheme(t){
      const theme = (t === 'light') ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', theme==='light' ? '#ffffff' : '#0f172a');
      try{ localStorage.setItem('theme', theme); }catch{}
    }
    setTheme(localStorage.getItem('theme') || 'dark');
    document.getElementById('toggleThemeTop')?.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      setTheme(cur);
    });

    function showLoader(show){ if(loader) loader.hidden = !show; }
    function readCachedData(maxAgeMs = Infinity){
      try{
        const cached = JSON.parse(localStorage.getItem('doa_cache') || 'null');
        if(!cached || !Array.isArray(cached.data)) return [];
        const age = Date.now() - Number(cached.ts || 0);
        if(age > maxAgeMs) return [];
        return cached.data.filter(d=>String(d?.aktif ?? 'TRUE').toUpperCase()!=='FALSE');
      }catch{
        return [];
      }
    }
    function parseCats(raw){ if(!raw) return []; return String(raw).split(',').map(s=>s.trim()).filter(Boolean); }
    function makeLink(id){ return `${location.origin}${location.pathname}?id=${encodeURIComponent(id)}`; }
    function copyFullText(text){
      return new Promise((resolve,reject)=>{
        try{
          if(navigator.clipboard?.writeText){ navigator.clipboard.writeText(text).then(resolve,reject); }
          else{
            const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.left='-9999px';
            document.body.appendChild(ta); ta.focus(); ta.select(); const ok=document.execCommand('copy');
            document.body.removeChild(ta); ok?resolve():reject(new Error('execCommand failed'));
          }
        }catch(e){ reject(e); }
      });
    }
    function getParam(name){ return new URL(location.href).searchParams.get(name); }
    function pushModalURL(id){ const u=new URL(location.href); u.searchParams.set('id', id); history.pushState({modal:true,id}, '', u.toString()); }
    function replaceWithoutId(){ const u=new URL(location.href); u.searchParams.delete('id'); history.replaceState(null,'',u.toString()); }
    function getFsModal(){ return parseFloat(localStorage.getItem('fs_modal') || getComputedStyle(document.documentElement).getPropertyValue('--fsModal')) || 1.1; }
    function setFsModal(v){ document.documentElement.style.setProperty('--fsModal', v); localStorage.setItem('fs_modal', v); }
    function formatArabicEveryLine(raw){
      const text = String(raw||'').replace(/\r\n?/g,'\n');
      const container = document.createElement('div');
      text.split('\n').forEach(l=>{
        const seg = document.createElement('div'); seg.className = 'seg';
        seg.textContent = l || '\u00A0'; container.appendChild(seg);
      });
      return container.innerHTML;
    }

    function saveBM(){ localStorage.setItem('bm', JSON.stringify([...state.bookmarks])); drawBM(); }
    function drawBM(){
      bmList.innerHTML = '';
      if(!state.bookmarks.size){
        bmList.innerHTML = '<span class="empty">Belum ada penanda.</span>';
        return;
      }
      state.bookmarks.forEach(id=>{
        const d = DOA.find(x=>x.id===id); if(!d) return;
        const b = document.createElement('button');
        b.className = 'bm';
        b.textContent = '🔖 ' + (d.judul||'Tanpa judul');
        b.onclick = ()=> openDoaFull(d);
        bmList.appendChild(b);
      });
    }

    async function fetchData(force=false){
      showLoader(true);
      try{
        if(!force){
          const cachedData = readCachedData(60_000); // cache 1 menit
          if(cachedData.length){
            DOA = cachedData;
            rebuildTabs(); render(); openFromQuery();
            return;
          }
        }

        const r = await fetch(DATA_URL + '?v=' + Date.now(), { cache: 'no-store' });
        if(!r.ok) throw new Error('Gagal memuat data.json');
        const json = await r.json();
        const arr = Array.isArray(json?.data) ? json.data
                  : Array.isArray(json) ? json : [];
        DOA = arr.filter(d=>String(d?.aktif ?? 'TRUE').toUpperCase()!=='FALSE');
        localStorage.setItem('doa_cache', JSON.stringify({ts:Date.now(), data:DOA}));
        rebuildTabs(); render(); openFromQuery();
      }catch(e){
        console.error(e);

        const staleData = readCachedData();
        if(staleData.length){
          DOA = staleData;
          rebuildTabs(); render(); openFromQuery();
          toast('Gagal memuat data terbaru. Menampilkan data tersimpan.');
          return;
        }

        list.innerHTML = '';
        const err = document.createElement('div');
        err.className='card';
        err.innerHTML = 'Tidak dapat memuat data. <button class="btn" id="retry">Coba lagi</button>';
        list.appendChild(err);
        document.getElementById('retry').onclick = ()=> { fetchData(true); };
      } finally {
        showLoader(false);
      }
    }

    function rebuildTabs(){
      tabs.innerHTML='';
      const set = new Set();
      DOA.forEach(d => parseCats(d.kategori).forEach(k => set.add(k)));
      KAT = ["Semua", ...Array.from(set)];
      KAT.forEach(k=>{
        const b = document.createElement('button');
        b.className='chip'; b.textContent=k || 'Tanpa Kategori';
        b.onclick=()=>{ state.kat=k; [...tabs.children].forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); };
        if(k===state.kat) b.classList.add('active');
        tabs.appendChild(b);
      });
      drawBM();
    }

    function render(){
      list.innerHTML = '';
      const q = state.q.trim().toLowerCase();
      const data = DOA.filter(d => {
        const cats = parseCats(d.kategori);
        const inCat = (state.kat==='Semua') || cats.includes(state.kat);
        const inText = !q || String(d.judul||'').toLowerCase().includes(q) || String(d.arab||'').includes(q);
        return inCat && inText;
      });

      data.forEach(d=>{
        const node = tpl.content.cloneNode(true);
        const summary = node.querySelector('summary');
        const badge = node.querySelector('.resume-badge');
        const container = node.querySelector('details.doa');
        container.dataset.id = d.id;

        const saved = parseInt(localStorage.getItem('pos_'+d.id)||'0', 10);
        if(saved>0){ badge.hidden = false; }

        summary.addEventListener('click', (ev)=>{
          if(ev.target.closest('.actions')) return;
          ev.preventDefault(); ev.stopPropagation();
          openDoaFull(d);
        }, {passive:false});

        node.querySelector('.ttl').textContent = d.judul || '(Tanpa judul)';
        node.querySelector('.txt-ar').innerHTML = formatArabicEveryLine(d.arab||'');

        node.querySelector('.bookmark').onclick = (e)=>{ 
          e.stopPropagation(); 
          state.bookmarks.has(d.id)?state.bookmarks.delete(d.id):state.bookmarks.add(d.id); 
          saveBM(); 
          toast(state.bookmarks.has(d.id)?'Ditambahkan ke penanda.':'Dihapus dari penanda.');
        };
        node.querySelector('.copy').onclick = async (e)=>{ 
          e.stopPropagation(); 
          const full = `${d.judul||''}\n${String(d.arab||'').replace(/\r\n?/g,'\n')}\n\n${makeLink(d.id)}`;
          try{ await copyFullText(full); toast('Teks doa lengkap tersalin ✔️'); }
          catch(err){ console.error(err); toast('Gagal menyalin. Tahan-tekan lalu salin manual.'); }
        };
        node.querySelector('.share').onclick = async (e)=>{ 
          e.stopPropagation(); 
          const link = makeLink(d.id);
          try{
            await copyFullText(`${d.judul||''}\n${String(d.arab||'').replace(/\r\n?/g,'\n')}\n\n${link}`);
            if(navigator.share){
              try{ await navigator.share({ title: d.judul || 'Doa', text: d.judul || 'Doa', url: link }); toast('Link dibagikan. Teks lengkap sudah disalin ✔️'); }
              catch{ toast('Teks lengkap disalin. Jika share dibatalkan, tempel manual di aplikasi.'); }
            }else{
              toast('Teks lengkap disalin. Bagikan link ini: ' + link);
            }
          }catch(err){
            console.error(err);
            if(navigator.share){ try{ await navigator.share({ title: d.judul || 'Doa', text: d.judul || 'Doa', url: link }); }catch{} }
            toast('Share link dikirim. (Salin teks manual bila perlu)');
          }
        };

        list.appendChild(node);
      });

      if(!data.length){
        const empty=document.createElement('div');
        empty.className='card';
        empty.textContent='Tidak ada hasil.';
        list.appendChild(empty);
      }
    }

    /* Drawer */
    const drawer=document.getElementById('drawer'), shade=document.getElementById('shade');
    document.getElementById('hamburger').onclick=()=>{drawer.classList.add('open');shade.classList.add('show');};
    document.getElementById('closeDrawer').onclick=()=>{drawer.classList.remove('open');shade.classList.remove('show');};
    shade.onclick=()=>{drawer.classList.remove('open');shade.classList.remove('show');};
    document.getElementById('clearAllPos')?.addEventListener('click', () => {
      drawer.classList.remove('open');
      shade.classList.remove('show');
      Object.keys(localStorage).forEach(k => { if (k.startsWith('pos_')) localStorage.removeItem(k); });
      document.querySelectorAll('.resume-badge').forEach(b => b.setAttribute('hidden',''));
      toast('Semua posisi terakhir dihapus 🧽');
    });

    function openDoaFull(d){
      currentDoa = d;
      modalTitle.textContent = d.judul || 'Doa';
      modalArabic.innerHTML = formatArabicEveryLine(d.arab||'');
      modalShade.classList.add('show');
      modal.classList.add('show');
      modal.setAttribute('aria-hidden','false');
      setFsModal(getFsModal());
      pushModalURL(d.id);

      const saved = parseInt(localStorage.getItem('pos_'+d.id)||'0', 10);
      if(saved>0){
        resumeBar.classList.add('show');
        resumeBtn.onclick = () => {
          modalBody.scrollTop = saved;
          toast('Dilanjutkan ke posisi terakhir.');
          const badgeSel = document.querySelector(`details.doa[data-id="${d.id}"] .resume-badge`);
          if (badgeSel) { badgeSel.setAttribute('hidden',''); }
        };
      }else{
        resumeBar.classList.remove('show');
        resumeBtn.onclick = null;
      }
    }
    function hideModalUI(){
      modalShade.classList.remove('show');
      modal.classList.remove('show');
      modal.setAttribute('aria-hidden','true');
      currentDoa = null;
      resumeBar.classList.remove('show');
      resumeBtn.onclick = null;
    }
    function closeDoaFull(){
      if(history.state && history.state.modal){ history.back(); }
      else{ hideModalUI(); replaceWithoutId(); }
    }

    modalShade?.addEventListener('click', closeDoaFull);
    closeModalBtn?.addEventListener('click', closeDoaFull);
    toggleThemeModal?.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      setTheme(cur);
    });
    fontPlus?.addEventListener('click', () => { setFsModal(Math.min(1.8, getFsModal() + 0.06)); });
    fontMinus?.addEventListener('click', () => { setFsModal(Math.max(0.8, getFsModal() - 0.06)); });

    markPosBtn.onclick = () => {
      if(!currentDoa) return;
      const key = 'pos_' + currentDoa.id;
      localStorage.setItem(key, String(modalBody.scrollTop));
      toast('Posisi terakhir disimpan 📌');
      resumeBar.classList.add('show');
      resumeBtn.onclick = () => { modalBody.scrollTop = parseInt(localStorage.getItem(key)||'0',10); toast('Dilanjutkan ke posisi terakhir.'); };
      const badgeSel = document.querySelector(`details.doa[data-id="${currentDoa.id}"] .resume-badge`);
      if (badgeSel) { badgeSel.removeAttribute('hidden'); }
    };
    clearPosBtn.onclick = () => {
      if (!currentDoa) return;
      const key = 'pos_' + currentDoa.id;
      localStorage.removeItem(key);
      toast('Posisi terakhir dihapus 🧹');
      resumeBar.classList.remove('show');
      resumeBtn.onclick = null;
      const badgeSel = document.querySelector(`details.doa[data-id="${currentDoa.id}"] .resume-badge`);
      if (badgeSel) { badgeSel.setAttribute('hidden',''); }
    };

    window.addEventListener('keydown', (e)=>{ if(e.key === 'Escape' && modal.classList.contains('show')){ e.preventDefault(); closeDoaFull(); } });
    window.addEventListener('popstate', ()=>{ if(modal.classList.contains('show')) hideModalUI(); });

    function openFromQuery(){
      const id = getParam('id'); if(!id) return;
      const d = DOA.find(x=>String(x.id)===String(id)); if(!d) return;
      replaceWithoutId(); openDoaFull(d);
    }

    /* SEARCH */
    const searchInput = document.getElementById('q');
    const clearBtn = document.getElementById('clearBtn');
    if (searchInput){
      searchInput.addEventListener('input',(e)=>{
        state.q = e.target.value;
        if (clearBtn) clearBtn.hidden = !state.q;
        render();
      });
    }
    clearBtn?.addEventListener('click', ()=>{
      if (!searchInput) return;
      searchInput.value = '';
      state.q = '';
      clearBtn.hidden = true;
      render();
    });

    document.querySelector('.title').textContent = APP_TITLE;
    document.getElementById('year').textContent = new Date().getFullYear();
    fetchData();

    /* Hindari reload tidak sengaja tanpa mengganggu saat keluar halaman */
    (function(){
      function onKey(e){
        const k = (e.key||'').toLowerCase();
        if (e.key === 'F5' || ((e.ctrlKey||e.metaKey) && k === 'r')) {
          e.preventDefault();
          try{ if(typeof toast==='function') toast('Gunakan tombol aplikasi bila perlu memuat ulang.'); }catch{}
        }
      }
      window.addEventListener('keydown', onKey, {capture:true});
    })();
  </script>
