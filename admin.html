<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Doa</title>
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root{--bg:#0b1020;--panel:#0f172a;--card:#111827;--text:#e2e8f0;--muted:#94a3b8;--accent:#22c55e;--line:#ffffff1f}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#17315c 0%,transparent 25%),var(--bg);color:var(--text);font:16px/1.68 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    .wrap{max-width:860px;margin:auto;padding:14px 12px 24px}
    .hero,.card{border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 30px #00000030}
    .hero{padding:16px;background:linear-gradient(135deg,rgba(34,197,94,.16),rgba(15,23,42,.96));margin-bottom:14px}
    .card{background:rgba(17,24,39,.95);padding:16px}
    .brand{display:flex;align-items:center;gap:12px}.brand img{width:50px;height:50px;border-radius:14px;object-fit:contain;background:#ffffff12}
    .eyebrow{color:#86efac;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    h1{margin:4px 0 0;font-size:clamp(22px,5vw,30px);line-height:1.15}
    p{margin:8px 0 0;color:var(--muted)}
    .nav{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .nav a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:9px 12px;border-radius:12px;border:1px solid #22c55e44;background:#ffffff0c;color:var(--text);text-decoration:none;font-weight:700}
    form{display:grid;gap:12px}
    .field{display:grid;gap:6px}
    .field span{font-size:13px;color:var(--muted)}
    input,textarea,button{font:inherit}
    input,textarea{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--text)}
    textarea{min-height:200px;resize:vertical}
    button{cursor:pointer;border:1px solid #22c55e55;background:#16a34a2b;color:var(--text);padding:12px 14px;border-radius:12px;font-weight:700;min-height:46px}
    button:disabled{opacity:.7;cursor:wait}
    #msg{min-height:24px;font-size:14px}
    #msg.ok{color:#86efac}
    #msg.err{color:#fca5a5}
    @media (max-width:560px){.wrap{padding:12px 10px 20px}.brand{align-items:flex-start}.nav a{flex:1 1 100%}.card,.hero{padding:14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="brand">
        <img src="logo.png" alt="Logo Mafatihul Akhyar">
        <div>
          <div class="eyebrow">Panel Pengelola</div>
          <h1>Admin Doa</h1>
        </div>
      </div>
      <p>Gunakan halaman ini untuk menambah data doa baru dengan tampilan yang lebih nyaman saat dibuka di HP.</p>
      <div class="nav">
        <a href="index.html">← Kembali ke Beranda</a>
      </div>
    </section>

    <div class="card">
      <form id="f">
        <label class="field">
          <span>ID unik</span>
          <input name="id" placeholder="mis. doa-pembuka" required>
        </label>
        <label class="field">
          <span>Judul</span>
          <input name="judul" placeholder="Judul doa" required>
        </label>
        <label class="field">
          <span>Kategori</span>
          <input name="kategori" placeholder="opsional, pisahkan dengan koma">
        </label>
        <label class="field">
          <span>Teks doa / wirid</span>
          <textarea name="arab" placeholder="Tulis isi doa di sini..." required></textarea>
        </label>
        <label class="field">
          <span>API KEY</span>
          <input name="key" placeholder="Masukkan API KEY" required>
        </label>
        <button type="submit">Tambah Doa</button>
        <div id="msg" aria-live="polite"></div>
      </form>
    </div>
  </div>

  <script>
    const API = 'https://script.google.com/macros/s/AKfycbxl6VFT-C4sPe3V3wnfLOeuad55-jvCk08w4mAfMPrdIwogUNn5T-XL4ChZbBtEbxeKTQ/exec';

    document.getElementById('f').onsubmit = async (e)=>{
      e.preventDefault();
      const form = e.target;
      const msg = document.getElementById('msg');
      const submitBtn = form.querySelector('button[type="submit"]');
      const fd = new FormData(form);
      const payload = Object.fromEntries(fd.entries());
      payload.action = 'add';

      msg.className = '';
      msg.textContent = 'Menyimpan data...';
      submitBtn.disabled = true;

      try {
        const r = await fetch(API, {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify(payload)
        });

        const j = await r.json();
        if(!r.ok || !j.ok) throw new Error(j.error || 'Permintaan gagal');

        msg.className = 'ok';
        msg.textContent = 'Berhasil ditambah.';
        form.reset();
      } catch (err) {
        msg.className = 'err';
        msg.textContent = 'Gagal: ' + (err.message || 'Terjadi kesalahan');
      } finally {
        submitBtn.disabled = false;
      }
    };
  </script>
</body>
</html>
