<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mafatihul Akhyar - Offline</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="logo.png" type="image/png">
  <style>
    :root{--bg:#0b1020;--panel:#0f172a;--text:#e2e8f0;--muted:#94a3b8;--accent:#22c55e}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#17315c 0%,transparent 25%),linear-gradient(180deg,#0b1020,#111827);color:var(--text);font:17px/1.72 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:18px}
    .card{max-width:560px;background:rgba(15,23,42,.96);border:1px solid #ffffff1a;border-radius:20px;padding:20px;box-shadow:0 12px 36px #00000035;text-align:center}
    .logo{width:62px;height:62px;object-fit:contain;border-radius:16px;background:#ffffff10;padding:6px;margin-bottom:10px}
    h1{margin:0 0 10px;font-size:clamp(24px,6vw,30px)}
    p{margin:0 0 10px;color:var(--muted)}
    .actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 14px;border-radius:12px;background:#16a34a2a;border:1px solid #22c55e55;color:var(--text);text-decoration:none;font-weight:700}
    @media (max-width:560px){body{padding:12px}.card{padding:16px}.btn{flex:1 1 100%}}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Logo Mafatihul Akhyar">
    <h1>Mode Offline</h1>
    <p>Internet sedang tidak tersedia, tetapi data wirid terakhir yang sudah tersimpan tetap bisa dibaca dengan nyaman dari HP.</p>
    <p>Sambungkan kembali internet untuk memuat pembaruan terbaru.</p>
    <div class="actions">
      <a class="btn" href="./index.html">Kembali ke Beranda</a>
      <a class="btn" href="javascript:location.reload()">Coba Lagi</a>
    </div>
  </div>
</body>
</html>
