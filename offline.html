<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mafatihul Akhyar - Offline</title>
  <meta name="theme-color" content="#050a18">
  <link rel="icon" href="logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#050a18;--text:#e8edf5;--muted:#8b9dc3;--accent:#10b981;--border:rgba(255,255,255,.08);--surface:rgba(255,255,255,.04);--transition:all .25s cubic-bezier(.4,0,.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text);font:16px/1.75 'Inter',system-ui,sans-serif;padding:20px;-webkit-font-smoothing:antialiased}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(16,185,129,.1),transparent 60%)}
    .card{max-width:480px;background:rgba(15,23,50,.65);border:1px solid var(--border);border-radius:24px;padding:32px 24px;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);text-align:center;animation:fadeUp .5s both;position:relative;z-index:1}
    .logo{width:64px;height:64px;object-fit:contain;border-radius:18px;margin-bottom:16px;box-shadow:0 4px 24px rgba(16,185,129,.15)}
    .wifi-icon{width:48px;height:48px;margin:0 auto 16px;opacity:.4}
    h1{margin:0 0 12px;font-size:clamp(22px,5vw,28px);font-weight:800;letter-spacing:-.02em}
    p{margin:0 0 8px;color:var(--muted);font-size:15px}
    .actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:44px;padding:10px 20px;border-radius:14px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--text);text-decoration:none;font-weight:600;font-size:14px;transition:var(--transition);cursor:pointer}
    .btn:hover{background:rgba(16,185,129,.2);transform:translateY(-1px)}
    .btn:active{transform:scale(.97)}
    .pulse{animation:pulse 2s ease-in-out infinite}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}
    @media(max-width:480px){body{padding:14px}.card{padding:24px 18px}.btn{flex:1 1 100%}}
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo.png" alt="Logo Mafatihul Akhyar">
    <svg class="wifi-icon pulse" viewBox="0 0 24 24" fill="none"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="currentColor" opacity=".5"/></svg>
    <h1>Mode Offline</h1>
    <p>Internet sedang tidak tersedia, tetapi data wirid terakhir yang sudah tersimpan tetap bisa dibaca.</p>
    <p>Sambungkan kembali internet untuk memuat pembaruan terbaru.</p>
    <div class="actions">
      <a class="btn" href="./index.html">🏠 Kembali ke Beranda</a>
      <a class="btn" href="javascript:location.reload()">🔄 Coba Lagi</a>
    </div>
  </div>
</body>
</html>
