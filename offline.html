<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mafatihul Akhyar - Offline</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    :root{--bg:#0b1020;--panel:#0f172a;--text:#e2e8f0;--muted:#94a3b8;--accent:#22c55e}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#0b1020,#111827);color:var(--text);font:16px/1.6 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px}
    .card{max-width:560px;background:var(--panel);border:1px solid #ffffff1a;border-radius:18px;padding:22px;box-shadow:0 12px 36px #00000035;text-align:center}
    h1{margin:0 0 10px;font-size:28px}
    p{margin:0 0 10px;color:var(--muted)}
    .btn{display:inline-block;margin-top:10px;padding:10px 14px;border-radius:10px;background:#16a34a2a;border:1px solid #22c55e55;color:var(--text);text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="card">
    <h1>Mode Offline</h1>
    <p>Internet sedang tidak tersedia, tetapi data wirid terakhir yang sudah tersimpan tetap bisa dibaca.</p>
    <p>Sambungkan kembali internet untuk memuat pembaruan terbaru.</p>
    <a class="btn" href="./index.html">Kembali ke Beranda</a>
  </div>
</body>
</html>
